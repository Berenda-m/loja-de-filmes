<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de filmes</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <!-- Cabeçalho do site -->
    <header>
        <div class="topo">
            <h1>Central Cinema</h1>
            <!-- Menu de navegação -->
            <nav>
                <ul>

                    <li><a href="index.html">Home</a></li>
                    <li><a href="indicados.html">Indicados</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><button>
                        <i class="fa-solid fa-lightbulb"></i>
                    </button></li>

                </ul>
            </nav>
        </div>
        <!-- Banner do site -->
        <section class="banner"></section>
    </header>
    <main>
        <section class="cadastro"> <!--título do cadastro de filmes-->
            <h2>Cadastre seus filmes favoritos <i class="fa-solid fa-film"></i></h2>
            <div class="card">
                <form id="formFilme"> <!--formulário de cadastro de filmes-->
                    <div class="campo">
                        <label for="titulo">Titulo do filme:</label>
                        <input type="text" id="titulo" placeholder="Digite aqui" required>
                    </div>

                    <div class="campo">
                        <label for="genero">Gênero:</label>
                        <input type="text" id="genero" list="listaGeneros" placeholder="Escolha um gênero" required>
                        <datalist id="listaGeneros">
                            <option value="">Selecione um gênero</option>"
                            <option>Ação</option>
                            <option>Aventura</option>
                            <option>Animação</option>
                            <option>Biografia</option>
                            <option>Comédia</option>
                            <option>Comédia Romântica</option>
                            <option>Crime</option>
                            <option>Documentário</option>
                            <option>Drama</option>
                            <option>Fantasia</option>
                            <option>Faroeste</option>
                            <option>Ficção Científica</option>
                            <option>Guerra</option>
                            <option>Histórico</option>
                            <option>Musical</option>
                            <option>Mistério</option>
                            <option>Romance</option>
                            <option>Suspense</option>
                            <option>Terror</option>
                            <option>Thriller</option>

                        </datalist>
                    </div>
                    <div class="campo">
                        <label for="ano">Ano de lançamento:</label>
                        <input type="number" id="ano" min="1900" max="2026" placeholder="Ano" required>
                    </div>
                    <div class="botoes">
                        <button class="botao" type="submit">Cadastrar filme</button>

                        <button class="botao" id="botaoLimpar" type="reset">Limpar campos</button>
                    </div>
                </form>
            </div>

        </section> <!--para o JavaScript-->
        <section id="listaFilmes">
        </section>
    </main>
    <!-- Adicionando o script JavaScript -->
    <script src="js/script.js"></script>

    <footer> <!-- Rodapé do site -->
        <p>&copy; 2023 Catálogo de Filmes. Todos os direitos reservados.</p>
    </footer>
</body>

</html>
